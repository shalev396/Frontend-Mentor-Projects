# Reusable workflow: Deploy static frontend to S3 + CloudFront
# Repository variables: AWS_REGION
# Repository secrets: AWS_ACCOUNT_ID
# Environment secrets (prod): AWS_S3_BUCKET, AWS_CLOUDFRONT_DISTRIBUTION_ID
name: Deploy

on:
  workflow_call:
    inputs:
      stage:
        description: 'Deployment stage (prod)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    name: Deploy Frontend (${{ inputs.stage }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.stage }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/my-github-actions-role
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*"
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
