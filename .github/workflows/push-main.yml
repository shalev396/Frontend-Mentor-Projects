# Push to main: deploy to prod environment
name: Push Main

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      stage: prod
